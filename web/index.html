<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Orbital Decay Predictor</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; background-color: #1a1a1a; }

        /* Layout */
        #sidebar { width: 320px; background-color: #222; color: #fff; display: flex; flex-direction: column; z-index: 1; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        #map { flex-grow: 1; position: relative; }

        /* Sidebar Styling */
        .header { padding: 20px; background-color: #111; border-bottom: 1px solid #333; }
        .header h1 { margin: 0; font-size: 1.2rem; color: #ffae42; }
        .header p { margin: 5px 0 0 0; font-size: 0.85rem; color: #aaa; }

        #satellite-list { flex-grow: 1; overflow-y: auto; padding: 0; margin: 0; list-style: none; }
        .sat-item { padding: 15px 20px; border-bottom: 1px solid #333; cursor: pointer; transition: background 0.2s; }
        .sat-item:hover { background-color: #333; }
        .sat-item .id { font-weight: bold; font-size: 1.1rem; color: #ff4d4d; }
        .sat-item .time { font-size: 0.85rem; color: #aaa; margin-top: 5px; }

        /* Mapbox Popup Overrides */
        .mapboxgl-popup-content { background-color: #222; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 15px; }
        .mapboxgl-popup-anchor-bottom .mapboxgl-popup-tip { border-top-color: #222; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <h1>Impending Re-entries</h1>
        <p id="status-text">Loading orbital data...</p>
    </div>
    <ul id="satellite-list"></ul>
</div>

<div id="map"></div>

<script>
    // 1. Insert your Mapbox Token here
    mapboxgl.accessToken = ***DEFAULT MAPBOX TOKEN REMOVED***;

    const map = new mapboxgl.Map({
        container: 'map',
        center: [0, 40],
        zoom: 1.5,

        projection: 'globe',
        style: 'mapbox://styles/cactusblue/cmq8uiwbh001301rm973k6cjw'
    });

    // Create a shared popup instance
    const popup = new mapboxgl.Popup({
        closeButton: false,
        closeOnClick: false
    });

    map.on('style.load', () => {
        fetch('decays.geojson')
            .then(response => response.json())
            .then(data => {
                const now = new Date();
                const futureFeatures = [];
                const impactFeatures = []; // To hold our new explosion points

                data.features.forEach(feature => {
                    const props = feature.properties;
                    const isTrajectory = props.type === 'trajectory';
                    
                    const decayTimeStr = isTrajectory 
                        ? props.timestamps[props.timestamps.length - 1] 
                        : props.timestamp;
                    
                    const decayDate = new Date(decayTimeStr);
                    
                    if (decayDate > now) {
                        // Keep the original line or point
                        futureFeatures.push(feature);
                        
                        // Spawn a new explosion point at the very end of the trajectory
                        if (isTrajectory) {
                            const coords = feature.geometry.coordinates;
                            impactFeatures.push({
                                type: 'Feature',
                                properties: {
                                    type: 'explosion', // Custom type just for the icon
                                    catalog_id: props.catalog_id,
                                    timestamp: decayTimeStr
                                },
                                geometry: {
                                    type: 'Point',
                                    coordinates: coords[coords.length - 1] // The exact impact coordinate
                                }
                            });
                        }
                    }
                });

                // Merge the lines, immediate decays, and our new explosion points!
                data.features = [...futureFeatures, ...impactFeatures];

                // Note: We use futureFeatures for the UI count so we don't double-count satellites
                document.getElementById('status-text').innerText = `${futureFeatures.length} impending re-entries`;
                
                populateSidebar(futureFeatures);
                initializeMapLayers(data);
            })
            .catch(err => {
                console.error("Error loading GeoJSON:", err);
                document.getElementById('status-text').innerText = "Failed to load data.";
            });
    });

    function initializeMapLayers(geojson) {
        map.addSource('decays', {
            type: 'geojson',
            lineMetrics: true,
            data: geojson
        });

        // Add Trajectories
        map.addLayer({
            'id': 'trajectory-lines',
            'type': 'line',
            'source': 'decays',
            'filter': ['==', ['get', 'type'], 'trajectory'],
            'layout': {
            },
            'paint': {
                'line-width': ['case', ['boolean', ['feature-state', 'hover'], false], 8, 4], // Thicken on hover
                'line-gradient': [
                    'interpolate',
                    ['linear'],
                    ['line-progress'],
                    0, 'rgba(255, 77, 77, 0.0)',   // 0% mark: Tail is completely transparent
                    0.5, 'rgba(255, 77, 77, 0.4)', // 50% mark: Starts to glow
                    1, 'rgba(255, 77, 77, 1.0)'    // 100% mark: Solid red at the impact point
                ]
            }
        });

        // Add Impacts 
        map.addLayer({
            'id': 'explosions',
            'type': 'symbol',
            'source': 'decays',
            'filter': ['any', ['==', ['get', 'type'], 'explosion'], ['==', ['get', 'type'], 'immediate_decay']],
            'layout': {
                'text-field': '✹', 
                'text-size': 20,
                'text-allow-overlap': true
            },
            'paint': {
                'text-color': '#ffae42', // Bright explosion orange
                'text-halo-color': '#1a1a1a', // Dark outline to make it pop against the map
                'text-halo-width': 2
            }
        });

        // Add Immediate Points
        map.addLayer({
            'id': 'immediate-points',
            'type': 'circle',
            'source': 'decays',
            'filter': ['==', ['get', 'type'], 'immediate_decay'],
            'paint': {
                'circle-radius': ['case', ['boolean', ['feature-state', 'hover'], false], 10, 6],
                'circle-color': '#ffae42',
                'circle-stroke-width': 1,
                'circle-stroke-color': '#ffffff'
            }
        });

        setupInteractivity();
    }

    function populateSidebar(features) {
        const list = document.getElementById('satellite-list');

        features.forEach((feature, index) => {
            const props = feature.properties;
            const isTrajectory = props.type === 'trajectory';

            // For trajectories, grab the last timestamp. For points, grab the only timestamp.
            const decayTime = isTrajectory ? props.timestamps[props.timestamps.length - 1] : props.timestamp;
            const dateObj = new Date(decayTime);

            const li = document.createElement('li');
            li.className = 'sat-item';
            li.innerHTML = `
                <div class="id">NORAD: ${props.catalog_id}</div>
                <div class="time">Decay: ${dateObj.toLocaleString()}</div>
            `;

            // Fly to the satellite when clicked in the sidebar
            li.addEventListener('click', () => {
                let targetCoords;
                if (isTrajectory) {
                    const coords = feature.geometry.coordinates;
                    targetCoords = coords[coords.length - 1]; // Fly to the end of the line
                } else {
                    targetCoords = feature.geometry.coordinates;
                }

                map.flyTo({
                    center: targetCoords,
                    zoom: 5,
                    pitch: 60,
                    essential: true
                });
            });

            list.appendChild(li);
        });
    }

    function setupInteractivity() {
        // Change cursor on hover
        map.on('mouseenter', 'trajectory-lines', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'trajectory-lines', () => map.getCanvas().style.cursor = '');
        map.on('mouseenter', 'immediate-points', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'immediate-points', () => map.getCanvas().style.cursor = '');

        // Click to show popup for Trajectories
        map.on('click', 'trajectory-lines', (e) => {
            const coordinates = e.lngLat;
            const props = e.features[0].properties;
            const timestamps = JSON.parse(props.timestamps); // Mapbox strings arrays in properties sometimes

            const html = `<strong>NORAD: ${props.catalog_id}</strong><br>Trajectory Time:<br>${new Date(timestamps[0]).toLocaleTimeString()} to ${new Date(timestamps[timestamps.length-1]).toLocaleTimeString()}`;

            new mapboxgl.Popup()
                .setLngLat(coordinates)
                .setHTML(html)
                .addTo(map);
        });

        map.on('mouseenter', 'explosions', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'explosions', () => map.getCanvas().style.cursor = '');

        // Click to show popup for Explosions
        map.on('click', 'explosions', (e) => {
            const coordinates = e.features[0].geometry.coordinates.slice();
            const props = e.features[0].properties;

            const html = `<strong>NORAD: ${props.catalog_id}</strong><br>Impact Time:<br>${new Date(props.timestamp).toLocaleString()}`;

            new mapboxgl.Popup()
                .setLngLat(coordinates)
                .setHTML(html)
                .addTo(map);
        });
    }
</script>
</body>
</html>
