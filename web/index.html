<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Orbital Decay Predictor</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; background-color: #1a1a1a; }

        /* Layout */
        #map { flex-grow: 1; position: relative; height: 100%; width: 100%; }
        
        #sidebar { 
            width: 320px; 
            background-color: #222; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            z-index: 10; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); 
            transition: transform 0.3s ease;
            position: relative;
        }

        /* Sidebar Styling */
        .header { padding: 20px; background-color: #111; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;}
        .header-content {flex-grow: 1;}
        .header h1 { margin: 0; font-size: 1.2rem; color: #ffae42; }
        .header p { margin: 5px 0 0 0; font-size: 0.85rem; color: #aaa; }

        #satellite-list { flex-grow: 1; overflow-y: auto; padding: 0; margin: 0; list-style: none; }
        .sat-item { padding: 15px 20px; border-bottom: 1px solid #333; cursor: pointer; transition: background 0.2s; }
        .sat-item:hover { background-color: #333; }
        .sat-item .name { font-weight: bold; font-size: 1.1rem; color: #ff4d4d; }
        .sat-item .id { font-size: 0.85rem; color: #aaa; margin-top: 5px; }
        .sat-item .time { font-size: 0.85rem; color: #aaa; margin-top: 5px; }

        /* Toggle Button */
        #toggle-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            display: none; /* Hidden by default on desktop */
            padding: 0 10px;
        }
        
        #toggle-btn:focus {
            outline: none;
        }

        /* Mapbox Popup Overrides */
        .mapboxgl-popup-content { background-color: #222; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 15px; }
        .mapboxgl-popup-anchor-bottom .mapboxgl-popup-tip { border-top-color: #222; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            #sidebar {
                position: absolute; /* Takes sidebar out of document flow */
                bottom: 0;
                left: 0;
                width: 100%;
                height: 45vh; /* Takes up bottom 45% */
                box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
            }
            
            #toggle-btn {
                display: block;
            }

            /* State classes for mobile toggle */
            #sidebar.collapsed {
                /* Header is approx 75px tall. Slide down almost completely out of view */
                transform: translateY(calc(100% - 75px)); 
            }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header" id="sidebar-header">
        <div class="header-content">
            <h1>Impending Re-entries</h1>
            <p id="status-text">Loading orbital data...</p>
        </div>
        <button id="toggle-btn">▼</button>
    </div>
    <ul id="satellite-list"></ul>
    <div style="padding: 15px 20px; font-size: 0.8rem; text-align: center; border-top: 1px solid #333; margin-top: auto;">
        <a href="privacy.html" style="color: #aaa; text-decoration: none;">Privacy Policy</a>
    </div>
</div>

<div id="map"></div>

<script>
    mapboxgl.accessToken = ***DEFAULT MAPBOX TOKEN REMOVED***;

    const map = new mapboxgl.Map({
        container: 'map',
        center: [0, 40],
        zoom: 1.5,
        minZoom: 1,
        maxZoom: 4,
        projection: 'globe',
        style: 'mapbox://styles/cactusblue/cmq8uiwbh001301rm973k6cjw'
    });

    const popup = new mapboxgl.Popup({
        closeButton: false,
        closeOnClick: false
    });

    // Sidebar Toggle Logic
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggle-btn');
    const sidebarHeader = document.getElementById('sidebar-header');

    function toggleSidebar() {
        if (window.innerWidth <= 768) {
            sidebar.classList.toggle('collapsed');
            toggleBtn.innerText = sidebar.classList.contains('collapsed') ? '▲' : '▼';
        }
    }

    toggleBtn.addEventListener('click', toggleSidebar);
    // Allow tapping the whole header to toggle on mobile for ease of use
    sidebarHeader.addEventListener('click', (e) => {
        if(window.innerWidth <= 768 && e.target !== toggleBtn) {
            toggleSidebar();
        }
    });

    // Handle window resize to reset states if moving between desktop/mobile views
    window.addEventListener('resize', () => {
        if (window.innerWidth > 768) {
            sidebar.classList.remove('collapsed');
        }
        map.resize();
    });

    map.on('style.load', () => {
        fetch('decays.geojson')
            .then(response => response.json())
            .then(data => {
                const now = new Date();
                const futureFeatures = [];
                const impactFeatures = [];

                data.features.forEach(feature => {
                    const props = feature.properties;
                    
                    const decayTimeStr = props.timestamps[props.timestamps.length - 1];
                    const decayDate = new Date(decayTimeStr);
                    
                    if (decayDate > now) {
                        futureFeatures.push(feature);
                        
                        const coords = feature.geometry.coordinates;
                        impactFeatures.push({
                            type: 'Feature',
                            properties: {
                                type: 'explosion', // Custom type just for the icon
                                satellite_name: props.satellite_name,
                                catalog_id: props.catalog_id,
                                timestamp: decayTimeStr
                            },
                            geometry: {
                                type: 'Point',
                                coordinates: coords[coords.length - 1] // The exact impact coordinate
                            }
                        });
                    }
                });

                // Sort the features so the soonest decay time is at the top of the list
                futureFeatures.sort((a, b) => {
                    const timeA = Date.parse(a.properties.timestamps[a.properties.timestamps.length - 1]);
                    const timeB = Date.parse(b.properties.timestamps[b.properties.timestamps.length - 1]);
                    
                    return timeA - timeB; 
                });

                data.features = [...futureFeatures, ...impactFeatures];

                document.getElementById('status-text').innerText = `${futureFeatures.length} impending re-entries`;
                
                populateSidebar(futureFeatures);
                initializeMapLayers(data);
            })
            .catch(err => {
                console.error("Error loading GeoJSON:", err);
                document.getElementById('status-text').innerText = "Failed to load data.";
            });
    });

    function initializeMapLayers(geojson) {
        map.addSource('decays', {
            type: 'geojson',
            lineMetrics: true,
            data: geojson
        });

        // Add Trajectories
        map.addLayer({
            'id': 'trajectory-lines',
            'type': 'line',
            'source': 'decays',
            'filter': ['==', ['get', 'type'], 'trajectory'],
            'layout': {
            },
            'paint': {
                'line-width': ['case', ['boolean', ['feature-state', 'hover'], false], 8, 4], // Thicken on hover
                'line-gradient': [
                    'interpolate',
                    ['linear'],
                    ['line-progress'],
                    0, 'rgba(255, 77, 77, 0.0)',   // 0% mark: Tail is completely transparent
                    0.5, 'rgba(255, 77, 77, 0.4)', // 50% mark: Starts to glow
                    1, 'rgba(255, 77, 77, 1.0)'    // 100% mark: Solid red at the impact point
                ]
            }
        });

        // Add Impacts 
        map.addLayer({
            'id': 'explosions',
            'type': 'symbol',
            'source': 'decays',
            'filter': ['==', ['get', 'type'], 'explosion'],
            'layout': {
                'text-field': '✹', 
                'text-size': 20,
                'text-allow-overlap': true
            },
            'paint': {
                'text-color': '#ffae42', // Bright explosion orange
                'text-halo-color': '#1a1a1a', // Dark outline to make it pop against the map
                'text-halo-width': 2
            }
        });

        // Add Satellite Labels
        map.addLayer({
            'id': 'satellite-labels',
            'type': 'symbol',
            'source': 'decays',
            'filter': ['==', ['get', 'type'], 'explosion'],
            'layout': {
                'text-field': ['get', 'satellite_name'],
                'text-size': 12,
                'text-offset': [0, 1.2],
                'text-anchor': 'top'
            },
            'paint': {
                'text-color': '#ffffff',
                'text-halo-color': '#1a1a1a',
                'text-halo-width': 2
            }
        });

        setupInteractivity();
    }

    function populateSidebar(features) {
        const list = document.getElementById('satellite-list');

        features.forEach((feature, index) => {
            const props = feature.properties;

            const decayTime = props.timestamps[props.timestamps.length - 1];
            const dateObj = new Date(decayTime);

            const li = document.createElement('li');
            li.className = 'sat-item';
            li.innerHTML = `
                <div class="name">${props.satellite_name}</div>
                <div class="id">NORAD ID: ${props.catalog_id}</div>
                <div class="time">Re-Entry: ${dateObj.toLocaleString()}</div>
            `;

            // Fly to the satellite when clicked in the sidebar
            li.addEventListener('click', () => {
                const coords = feature.geometry.coordinates;
                const targetCoords = coords[coords.length - 1]; 
                
                // If on mobile, collapse the sidebar after clicking an item to show the map
                if (window.innerWidth <= 768) {
                    toggleSidebar();
                }

                map.flyTo({
                    center: targetCoords,
                    zoom: 5,
                    pitch: 0,
                    essential: true
                });
            });

            list.appendChild(li);
        });
    }

    function setupInteractivity() {
        // Change cursor on hover
        map.on('mouseenter', 'trajectory-lines', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'trajectory-lines', () => map.getCanvas().style.cursor = '');
        map.on('mouseenter', 'explosions', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'explosions', () => map.getCanvas().style.cursor = '');

        // Unified click handler for overlapping layers
        map.on('click', (e) => {
            // Check if we clicked on either layer, and grab the topmost feature
            const features = map.queryRenderedFeatures(e.point, {
                layers: ['explosions', 'trajectory-lines']
            });

            // If we didn't click on either, do nothing
            if (!features.length) return;

            const feature = features[0];
            const props = feature.properties;

            // Generate the correct popup based on which layer was visually on top
            if (feature.layer.id === 'explosions') {
                const coordinates = feature.geometry.coordinates.slice();
                const html = `<strong>${props.satellite_name}</strong><br>NORAD: ${props.catalog_id}<br>Re-Entry Time:<br>${new Date(props.timestamp).toLocaleString()}`;
                
                new mapboxgl.Popup()
                    .setLngLat(coordinates)
                    .setHTML(html)
                    .addTo(map);

            } else if (feature.layer.id === 'trajectory-lines') {
                const coordinates = e.lngLat;
                const timestamps = JSON.parse(props.timestamps);
                const html = `<strong>${props.satellite_name}</strong><br>NORAD: ${props.catalog_id}<br>Trajectory Time:<br>${new Date(timestamps[0]).toLocaleTimeString()} to ${new Date(timestamps[timestamps.length-1]).toLocaleTimeString()}`;
                
                new mapboxgl.Popup()
                    .setLngLat(coordinates)
                    .setHTML(html)
                    .addTo(map);
            }
        });
    }
</script>
</body>
</html>
